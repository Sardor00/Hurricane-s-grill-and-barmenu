
<!DOCTYPE html> <html lang="en">  
<head>  
  <meta charset="UTF-8" />  
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />  
  <title>Hurricane's Grill & Bar</title>  
  <style>  
    :root{  
      --pink:#ea005f;  
      --pink-dark:#cc0053;  
      --bg:#f2f2f3;  
      --card:#ffffff;  
      --text:#666671;  
      --text-dark:#55545f;  
      --line:#efdae3;  
      --line-strong:#d48baa;  
      --shadow:0 6px 20px rgba(0,0,0,.08);  
      --radius-xl:28px;  
      --radius-lg:22px;  
      --radius-md:18px;  
    } *{box-sizing:border-box}  
html{scroll-behavior:smooth}  
body{  
  margin:0;  
  font-family:Arial,Helvetica,sans-serif;  
  background:var(--bg);  
  color:var(--text);  
}  

img{display:block;max-width:100%}  
button,input{font:inherit}  

.top-header{  
  background:var(--pink);  
  color:#fff;  
  padding:14px 16px;  
  position:sticky;  
  top:0;  
  z-index:1000;  
  box-shadow:0 2px 10px rgba(0,0,0,.1);  
}  

.top-header-row{  
  display:flex;  
  align-items:center;  
  justify-content:space-between;  
  gap:12px;  
}  

.top-title{  
  font-size:22px;  
  font-weight:700;  
  text-align:center;  
  flex:1;  
  white-space:nowrap;  
  overflow:hidden;  
  text-overflow:ellipsis;  
}  

.top-icon{  
  font-size:30px;  
  line-height:1;  
  flex-shrink:0;  
  background:none;  
  border:none;  
  color:#fff;  
  cursor:pointer;  
}  

.page{  
  max-width:860px;  
  margin:0 auto;  
  padding-bottom:100px;  
}  

.hero{  
  padding:26px 20px 8px;  
  text-align:center;  
}  

.lang-switch{  
  display:flex;  
  justify-content:center;  
  gap:12px;  
  flex-wrap:wrap;  
  margin-bottom:20px;  
}  

.lang-btn{  
  border:none;  
  padding:12px 22px;  
  border-radius:999px;  
  background:#fff;  
  color:var(--pink);  
  box-shadow:var(--shadow);  
  cursor:pointer;  
  font-weight:700;  
  border:1px solid var(--line);  
}  

.lang-btn.active{  
  background:var(--pink);  
  color:#fff;  
  border-color:var(--pink);  
}  

.hero-title{  
  font-size:34px;  
  font-weight:700;  
  color:var(--text-dark);  
  margin:0 0 8px;  
}  

.hero-arrow{  
  font-size:28px;  
  vertical-align:middle;  
  margin-left:8px;  
}  

.hero-text{  
  font-size:20px;  
  line-height:1.5;  
  margin:0 auto 24px;  
  max-width:760px;  
}  

.search-row{  
  display:flex;  
  align-items:center;  
  gap:12px;  
  padding:0 20px 18px;  
}  

.search-wrap{  
  position:relative;  
  flex:1;  
}  

.search-input{  
  width:100%;  
  border:2px solid #df9fb9;  
  border-radius:999px;  
  padding:18px 22px 18px 54px;  
  font-size:18px;  
  background:#fff;  
  outline:none;  
  color:var(--text-dark);  
}  

.search-icon{  
  position:absolute;  
  left:18px;  
  top:50%;  
  transform:translateY(-50%);  
  color:#9b98a3;  
  font-size:26px;  
  pointer-events:none;  
}  

.filter-btn{  
  width:52px;  
  height:52px;  
  border:none;  
  background:transparent;  
  color:var(--pink);  
  font-size:28px;  
  cursor:pointer;  
}  

.tab-buttons{  
  display:flex;  
  gap:16px;  
  overflow-x:auto;  
  padding:0 20px 18px;  
  scrollbar-width:none;  
  -webkit-overflow-scrolling:touch;  
  box-shadow:0 2px 8px rgba(0,0,0,.05);  
  background:#f7f6f7;  
}  

.tab-buttons::-webkit-scrollbar{display:none}  

.tab-btn{  
  flex:0 0 auto;  
  min-width:max-content;  
  border:2px solid var(--line-strong);  
  background:#fff;  
  color:var(--pink);  
  padding:16px 28px;  
  border-radius:12px;  
  font-size:18px;  
  cursor:pointer;  
}  

.tab-btn.active{  
  background:var(--pink);  
  color:#fff;  
  border-color:var(--pink);  
}  

.content{  
  padding:0 20px;  
}  

.banner{  
  margin:22px 0 10px;  
  text-align:center;  
}  

.banner img{  
  width:100%;  
  height:230px;  
  object-fit:cover;  
  border-radius:16px;  
  box-shadow:var(--shadow);  
}  

.banner h2{  
  margin:18px 0 8px;  
  font-size:32px;  
  color:var(--text-dark);  
  font-weight:700;  
}  

.banner p{  
  margin:0 auto 22px;  
  font-size:21px;  
  line-height:1.55;  
  max-width:760px;  
}  

.accordion-item{  
  margin:14px 0;  
}  

.accordion-btn{  
  width:100%;  
  background:#faf8f9;  
  border:1.5px solid var(--line);  
  border-radius:18px;  
  padding:22px 26px;  
  font-size:26px;  
  color:var(--text-dark);  
  display:flex;  
  align-items:center;  
  justify-content:space-between;  
  text-align:left;  
  cursor:pointer;  
  gap:16px;  
}  

.accordion-btn > span:first-child{  
  flex:1;  
  min-width:0;  
  white-space:nowrap;  
  overflow:hidden;  
  text-overflow:ellipsis;  
}  

.accordion-icon{  
  flex-shrink:0;  
  font-size:24px;  
  transition:transform .25s ease;  
}  

.accordion-item.open > .accordion-btn .accordion-icon{  
  transform:rotate(180deg);  
}  

.accordion-content{  
  display:none;  
}  

.accordion-item.open > .accordion-content{  
  display:block;  
}  

.accordion-inner{  
  padding:14px 2px 2px;  
}  

.special-group-box{  
  border:2px solid #cf3d78;  
  border-radius:24px;  
  padding:16px;  
  margin:18px 0 22px;  
  background:#f7f4f6;  
}  

.special-group-title-btn{  
  width:100%;  
  background:#fff;  
  border:2px solid #eccad8;  
  border-radius:20px;  
  padding:22px 18px;  
  font-size:26px;  
  color:#e5005a;  
  display:flex;  
  justify-content:space-between;  
  align-items:center;  
  cursor:pointer;  
  gap:16px;  
}  

.special-group-title-btn > span:first-child{  
  flex:1;  
  min-width:0;  
}  

.special-group-desc{  
  text-align:center;  
  font-size:19px;  
  line-height:1.55;  
  margin:18px 6px 8px;  
  color:#666671;  
}  

.child-group-box{  
  border:1px solid #f0dfe6;  
  border-radius:20px;  
  padding:14px;  
  background:transparent;  
  margin-top:14px;  
}  

.child-group-title-btn{  
  width:100%;  
  background:#faf8f9;  
  border:1.5px solid #f0dfe6;  
  border-radius:18px;  
  padding:20px 18px;  
  font-size:25px;  
  color:#5a5864;  
  display:flex;  
  justify-content:space-between;  
  align-items:center;  
  cursor:pointer;  
  gap:16px;  
}  

.child-group-title-btn > span:first-child{  
  flex:1;  
  min-width:0;  
  text-align:left;  
}  

.child-group-desc{  
  text-align:center;  
  font-size:18px;  
  line-height:1.55;  
  margin:16px 8px 10px;  
}  

.food-card{  
  background:#fff;  
  border-radius:16px;  
  padding:14px;  
  box-shadow:0 4px 14px rgba(0,0,0,.08);  
  display:flex;  
  justify-content:space-between;  
  gap:14px;  
  margin:12px 0;  
  cursor:pointer;  
}  

.food-card-left{  
  flex:1;  
  min-width:0;  
}  

.food-card-title{  
  font-size:21px;  
  line-height:1.4;  
  color:#55545f;  
  font-weight:700;  
  margin-bottom:10px;  
  display:-webkit-box;  
  -webkit-line-clamp:2;  
  -webkit-box-orient:vertical;  
  overflow:hidden;  
}  

.food-card-desc{  
  font-size:17px;  
  line-height:1.5;  
  color:#666671;  
  margin-bottom:14px;  
  display:-webkit-box;  
  -webkit-line-clamp:3;  
  -webkit-box-orient:vertical;  
  overflow:hidden;  
}  

.food-card-price{  
  color:#e5005a;  
  font-size:22px;  
  font-weight:700;  
  margin-bottom:12px;  
}  

.food-card-icons{  
  display:flex;  
  flex-wrap:wrap;  
  gap:8px;  
}  

.food-card-icon{  
  width:38px;  
  height:38px;  
  border:1.6px solid #777;  
  border-radius:50%;  
  display:flex;  
  align-items:center;  
  justify-content:center;  
  font-size:12px;  
  color:#555;  
  background:#fff;  
  font-weight:700;  
}  

.food-card-right{  
  position:relative;  
  width:202px;  
  flex-shrink:0;  
}  

.food-card-image{  
  width:100%;  
  height:170px;  
  object-fit:cover;  
  border-radius:10px;  
}  

.food-card-fav{  
  position:absolute;  
  top:10px;  
  right:10px;  
  width:42px;  
  height:42px;  
  border-radius:50%;  
  border:none;  
  background:#fff;  
  box-shadow:0 2px 10px rgba(0,0,0,.12);  
  font-size:24px;  
  color:#666;  
  cursor:pointer;  
}  

.empty{  
  text-align:center;  
  padding:34px 16px;  
  font-size:18px;  
  color:#8a8792;  
}  

.powered{  
  text-align:center;  
  padding:34px 20px 12px;  
  color:#9997a1;  
  font-size:18px;  
}  

.powered strong{  
  color:var(--pink);  
  font-weight:700;  
}  

.scroll-top{  
  position:fixed;  
  right:18px;  
  bottom:18px;  
  width:78px;  
  height:78px;  
  border:none;  
  border-radius:50%;  
  background:var(--pink);  
  color:#fff;  
  font-size:38px;  
  cursor:pointer;  
  box-shadow:0 16px 30px rgba(234,0,95,.28);  
  z-index:1001;  
}  

.item-modal{  
  position:fixed;  
  inset:0;  
  background:#f2f2f3;  
  z-index:3000;  
  overflow:auto;  
}  

.item-modal.hidden{  
  display:none;  
}  

.item-modal-topbar{  
  position:sticky;  
  top:0;  
  z-index:3;  
  background:#ea005f;  
  display:flex;  
  justify-content:space-between;  
  padding:14px 16px;  
}  

.modal-icon-btn{  
  width:44px;  
  height:44px;  
  border:none;  
  border-radius:50%;  
  background:#fff;  
  color:#666;  
  font-size:26px;  
  cursor:pointer;  
}  

.item-modal-image{  
  width:100%;  
  height:430px;  
  object-fit:cover;  
}  

.item-modal-card{  
  background:#f2f2f3;  
  border-top-left-radius:34px;  
  border-top-right-radius:34px;  
  margin-top:-20px;  
  position:relative;  
  padding:22px 22px 40px;  
}  

.item-modal-head{  
  display:flex;  
  justify-content:space-between;  
  gap:14px;  
  align-items:flex-start;  
}  

.item-modal-head h2{  
  margin:0;  
  font-size:30px;  
  line-height:1.35;  
  color:#55545f;  
}  

.modal-heart-btn{  
  border:none;  
  background:transparent;  
  font-size:32px;  
  color:#666;  
  cursor:pointer;  
}  

.item-modal-desc{  
  font-size:19px;  
  line-height:1.65;  
  color:#666671;  
  margin:18px 0;  
  white-space:pre-line;  
}  

.item-modal-price{  
  color:#e5005a;  
  font-size:26px;  
  font-weight:700;  
  margin-bottom:14px;  
}  

.item-modal-allergens{  
  display:flex;  
  flex-wrap:wrap;  
  gap:10px;  
}  

.review-bar{  
  margin-top:24px;  
  background:#eb3c7f;  
  color:#fff;  
  border-radius:18px;  
  padding:20px 22px;  
  display:flex;  
  justify-content:space-between;  
  align-items:center;  
  gap:12px;  
  font-size:18px;  
  font-weight:700;  
  box-shadow:var(--shadow);  
}  

.hidden{display:none!important}  

@media (max-width:700px){  
  .top-title{font-size:18px}  
  .hero-title{font-size:28px}  
  .hero-text{font-size:18px}  
  .tab-btn{font-size:16px;padding:14px 22px}  
  .banner img{height:180px}  
  .banner h2{font-size:28px}  
  .banner p{font-size:18px}  
  .accordion-btn{font-size:22px;padding:20px}  
  .food-card{gap:10px}  
  .food-card-right{width:140px}  
  .food-card-image{height:120px}  
  .food-card-title{font-size:17px}  
  .food-card-desc{font-size:15px}  
  .food-card-price{font-size:18px}  
  .special-group-title-btn,  
  .child-group-title-btn{font-size:18px}  
  .item-modal-image{height:300px}  
  .item-modal-head h2{font-size:24px}  
  .item-modal-desc{font-size:17px}  
  .review-bar{font-size:16px;padding:18px}  
}

  </style>  
</head>

    function setLang(lang){  
      currentLang = lang;  
      document.getElementById("enBtn").classList.toggle("active", lang === "en");  
      document.getElementById("ruBtn").classList.toggle("active", lang === "ru");  
      renderAll();  
    }  
  
    function setTab(key){  
      activeTab = key;  
      renderAll();  
      window.scrollTo({ top: 0, behavior: "smooth" });  
    }  
  
    function renderTabs(){  
      const el = document.getElementById("buttonTabs");  
      el.innerHTML = tabs.map(tab => `  
        <button class="tab-btn ${activeTab === tab.key ? "active" : ""}" onclick="setTab('${tab.key}')">  
          ${tab.title[currentLang]}  
        </button>  
      `).join("");  
    }  
  
    function escapeHtml(str){  
      return String(str)  
        .replaceAll("&", "&amp;")  
        .replaceAll("<", "&lt;")  
        .replaceAll(">", "&gt;")  
        .replaceAll('"', "&quot;")  
        .replaceAll("'", "&#39;");  
    }  
  
    function allergenIcons(list){  
      if(!list || !list.length) return "";  
      return `  
        <div class="food-card-icons">  
          ${list.map(a => `<div class="food-card-icon" title="${escapeHtml(a)}">${escapeHtml(a.charAt(0).toUpperCase())}</div>`).join("")}  
        </div>  
      `;  
    }  
  
    function renderFoodCard(item){  
      const json = encodeURIComponent(JSON.stringify(item));  
      const allergens = (item.allergens && item.allergens[currentLang]) || [];

      return `  
        <div class="food-card" data-item="${json}" onclick="openItemModalFromElement(this)">  
          <div class="food-card-left">  
            <div class="food-card-title">${escapeHtml(item.name[currentLang])}</div>  
            <div class="food-card-desc">${escapeHtml(item.shortDesc[currentLang])}</div>  
            <div class="food-card-price">${escapeHtml(item.price)}</div>
            ${allergenIcons(allergens)}

            

          </div>  
  
          <div class="food-card-right">  
            <img class="food-card-image" src="${escapeHtml(item.image)}" alt="${escapeHtml(item.name[currentLang])}">  
            <button class="food-card-fav" type="button" onclick="event.stopPropagation()">♡</button>  
          </div>  
        </div>  
      `;  
    }  
  
    function renderChildAccordion(child){  
      const itemsHtml = (child.items || []).map(renderFoodCard).join("");  
      return `  
        <div class="child-group-box accordion-item">  
          <button class="child-group-title-btn accordion-btn" type="button">  
            <span>${escapeHtml(child.title[currentLang])}</span>  
            <span class="accordion-icon">⌄</span>  
          </button>  
          <div class="accordion-content">  
            <div class="accordion-inner">  
              <div class="child-group-desc">${escapeHtml(child.desc[currentLang])}</div>  
              ${itemsHtml || `<div class="empty">${ui[currentLang].empty}</div>`}  
            </div>  
          </div>  
        </div>  
      `;  
    }  
  
    function renderSpecialGroup(section){  
      return `  
        <div class="special-group-box accordion-item ${section.open ? "open" : ""}">  
          <button class="special-group-title-btn accordion-btn" type="button">  
            <span>${escapeHtml(section.title[currentLang])}</span>  
            <span class="accordion-icon">⌄</span>  
          </button>  
          <div class="accordion-content">  
            <div class="accordion-inner">  
              <div class="special-group-desc">${escapeHtml(section.desc[currentLang])}</div>  
              ${(section.children || []).map(renderChildAccordion).join("")}  
            </div>  
          </div>  
        </div>  
      `;  
    }  
  
    function renderStandardAccordion(section){  
      const itemsHtml = (section.items || []).map(renderFoodCard).join("");  
  
      return `  
        <div class="accordion-item">  
          <button class="accordion-btn" type="button">  
            <span>${escapeHtml(section.title[currentLang])}</span>  
            <span class="accordion-icon">⌄</span>  
          </button>  
          <div class="accordion-content">  
            <div class="accordion-inner">  
              ${itemsHtml || `<div class="empty">${ui[currentLang].empty}</div>`}  
            </div>  
          </div>  
        </div>  
      `;  
    }  
  
    function itemMatchesSearch(item, searchValue){  
      if(!searchValue) return true;  
      const text = [  
        item.name[currentLang] || "",  
        item.shortDesc[currentLang] || "",  
        item.longDesc[currentLang] || "",  
        ...((item.allergens && item.allergens[currentLang]) || [])  
      ].join(" ").toLowerCase();  
      return text.includes(searchValue);  
    }  

function renderNestedSection(section, searchValue){
  if (section.children && section.children.length) {
    const filteredChildren = section.children.map(child => {
      const nested = renderNestedSection(child, searchValue);
      return { child, nested };
    }).filter(entry => entry.nested.trim() !== "");

    const titleMatch = section.title[currentLang].toLowerCase().includes(searchValue || "");

    if (!filteredChildren.length && searchValue && !titleMatch) {
      return "";
    }

    return `
      <div class="child-group-box accordion-item">
        <button class="child-group-title-btn accordion-btn" type="button">
          <span>${escapeHtml(section.title[currentLang])}</span>
          <span class="accordion-icon">⌄</span>
        </button>
        <div class="accordion-content">
          <div class="accordion-inner">
            ${section.desc ? `<div class="child-group-desc">${escapeHtml(section.desc[currentLang])}</div>` : ""}
            ${filteredChildren.map(entry => entry.nested).join("") || `<div class="empty">${ui[currentLang].empty}</div>`}
          </div>
        </div>
      </div>
    `;
  }

  const items = (section.items || []).filter(item => itemMatchesSearch(item, searchValue));
  const titleMatch = section.title[currentLang].toLowerCase().includes(searchValue || "");

  if (!items.length && searchValue && !titleMatch) {
    return "";
  }

  return `
    <div class="child-group-box accordion-item">
      <button class="child-group-title-btn accordion-btn" type="button">
        <span>${escapeHtml(section.title[currentLang])}</span>
        <span class="accordion-icon">⌄</span>
      </button>
      <div class="accordion-content">
        <div class="accordion-inner">
          ${section.desc ? `<div class="child-group-desc">${escapeHtml(section.desc[currentLang])}</div>` : ""}
          ${items.map(renderFoodCard).join("") || `<div class="empty">${ui[currentLang].empty}</div>`}
        </div>
      </div>
    </div>
  `;
}

  
    function renderContent(){  
      const tab = tabs.find(t => t.key === activeTab);  
      const searchValue = document.getElementById("searchInput").value.trim().toLowerCase();  
      const content = document.getElementById("content");  
  
      let html = `  
        <div class="banner">  
          <img src="${escapeHtml(tab.banner)}" alt="${escapeHtml(tab.title[currentLang])}">  
          <h2>${escapeHtml(tab.title[currentLang])}</h2>  
          <p>${escapeHtml(tab.desc[currentLang])}</p>  
        </div>  
      `;  
  
      if(tab.key === "food"){  
        const filteredSections = tab.sections.map(section => {  

if(section.specialGroup){
  const renderedChildren = (section.children || [])
    .map(child => renderNestedSection(child, searchValue))
    .filter(Boolean);

  const titleMatch = section.title[currentLang].toLowerCase().includes(searchValue);

  return {
    ...section,
    renderedChildren,
    keepVisible: renderedChildren.length > 0 || !searchValue || titleMatch
  };
}

  
          const items = (section.items || []).filter(item => itemMatchesSearch(item, searchValue));  
          const titleMatch = section.title[currentLang].toLowerCase().includes(searchValue);  
          return { ...section, items, keepVisible: items.length > 0 || !searchValue || titleMatch };  
        }).filter(section => {  
          if(section.specialGroup){  
            return section.children && section.children.length > 0;  
          }  
          return section.keepVisible;  
        });  
  

const sectionsHtml = filteredSections.map(section => {
  if(section.specialGroup){
    return `
      <div class="special-group-box accordion-item ${section.open ? "open" : ""}">
        <button class="special-group-title-btn accordion-btn" type="button">
          <span>${escapeHtml(section.title[currentLang])}</span>
          <span class="accordion-icon">⌄</span>
        </button>
        <div class="accordion-content">
          <div class="accordion-inner">
            <div class="special-group-desc">${escapeHtml(section.desc[currentLang])}</div>
            ${section.renderedChildren.join("")}
          </div>
        </div>
      </div>
    `;
  }
  return renderStandardAccordion(section);
}).join("");

  
        html += sectionsHtml || `<div class="empty">${ui[currentLang].empty}</div>`;  
      } else {  
        const filteredSections = (tab.sections || []).map(section => {  
          const items = (section.items || []).filter(item => itemMatchesSearch(item, searchValue));  
          const titleMatch = section.title[currentLang].toLowerCase().includes(searchValue);  
          return { ...section, items, keepVisible: items.length > 0 || !searchValue || titleMatch };  
        }).filter(section => section.keepVisible);  
  
        const sectionsHtml = filteredSections.map(renderStandardAccordion).join("");  
        html += sectionsHtml || `<div class="empty">${ui[currentLang].empty}</div>`;  
      }  
  
      content.innerHTML = html;  
      activateAccordions();  
    }  
  
    
function activateAccordions() {
  const accordionItems = document.querySelectorAll(".accordion-item");

  accordionItems.forEach((item, index) => {
    const btn = item.querySelector(":scope > .accordion-btn");
    const content = item.querySelector(":scope > .accordion-content");

    if (!btn || !content) return;

    if (openAccordions.has(index)) {
      item.classList.add("open");
      content.style.display = "block";
      content.style.maxHeight = "none";
    } else {
      item.classList.remove("open");
      content.style.display = "none";
      content.style.maxHeight = "0";
    }

    btn.onclick = function (e) {
      e.stopPropagation();

      if (openAccordions.has(index)) {
        openAccordions.delete(index);
        item.classList.remove("open");
        content.style.display = "none";
        content.style.maxHeight = "0";
      } else {
        openAccordions.add(index);
        item.classList.add("open");
        content.style.display = "block";
        content.style.maxHeight = "none";
      }
    };
  });
}

function openItemModalFromElement(el){  
      const encoded = el.getAttribute("data-item");  
      if(!encoded) return;  
      const item = JSON.parse(decodeURIComponent(encoded));  
      openItemModal(item);  
    }  
  
    function openItemModal(item){  
      document.getElementById("modalImage").src = item.image;  
      document.getElementById("modalImage").alt = item.name[currentLang];  
      document.getElementById("modalTitle").textContent = item.name[currentLang];  
      document.getElementById("modalDesc").textContent = item.longDesc[currentLang];  
      document.getElementById("modalPrice").textContent = item.price;  
  
      
      const allergens = (item.allergens && item.allergens[currentLang]) || [];
  
      document.getElementById("modalAllergens").innerHTML =  
        allergens.map(a => `<div class="food-card-icon" title="${escapeHtml(a)}">${escapeHtml(a.charAt(0).toUpperCase())}</div>`).join("");  
  
      document.getElementById("reviewText").textContent = ui[currentLang].noReview;  
      document.getElementById("reviewButton").textContent = ui[currentLang].addReview;  
  
      document.getElementById("itemModal").classList.remove("hidden");  
      document.body.style.overflow = "hidden";  
    }  
  
    function closeItemModal(){  
      document.getElementById("itemModal").classList.add("hidden");  
      document.body.style.overflow = "";  
    }  
  
    
function debouncedRender() {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => {
    renderAll();
  }, 300);
}

function renderAll(){  
      document.getElementById("menuHeading").textContent = ui[currentLang].menu;  
      document.getElementById("introText").textContent = ui[currentLang].intro;  
      document.getElementById("searchInput").placeholder = ui[currentLang].search;  
      renderTabs();  
      renderContent();  
    }  
  
    renderAll();  
  </script> </body>
